name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-dotfiles:
    name: Test Dotfiles on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            distro: ubuntu
          - os: macos-latest
            distro: macos

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Ansible (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        pipx install ansible --include-deps
        pipx ensurepath

    - name: Add pipx to PATH
      run: |
        echo "$HOME/.local/bin" >> $GITHUB_PATH
      shell: bash

    - name: Prepare for ansible-pull
      run: |
        # Install galaxy collections
        ansible-galaxy collection install ansible.posix community.general
        # Add runner hostname to inventory
        HOSTNAME=$(hostname)
        echo "Adding hostname '$HOSTNAME' to inventory..."
        if [[ "${{ matrix.distro }}" == "macos" ]]; then
          sed -i.bak "/workstation:/a\\    ${HOSTNAME}: { mac: true }" hosts.yml
          # Set root password for ansible 'su' become method on macOS
          echo "root:ci-password" | sudo chpasswd
        else
          sed -i.bak "/workstation:/a\\    ${HOSTNAME}: {}" hosts.yml
          # Set root password for ansible 'su' become method on Ubuntu
          echo "root:ci-password" | sudo chpasswd
        fi
        echo "--- Updated hosts.yml ---"
        cat hosts.yml

    - name: Run ansible-pull for dotfiles
      run: >
        echo '${BECOME_PASS}' | ansible-pull -U '${ANSIBLE_REPO}' -K --tags 'onlydotfiles' -e 'target_username=${TARGET_USERNAME}' -e 'target_group=${TARGET_GROUP}' -e 'target_user_home=${TARGET_USER_HOME}'
      env:
        CI: true
        ANSIBLE_REPO: "file://${{ github.workspace }}"
        TARGET_USERNAME: runner
        TARGET_GROUP: runner
        TARGET_USER_HOME: ${{ env.RUNNER_HOME }}
        BECOME_PASS: ci-password

  test-dotfiles-debian:
    name: Test Dotfiles on Debian
    runs-on: ubuntu-latest
    container: debian:bullseye

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y sudo git curl zsh python3-pip python3-venv
          # pipx is not in debian bullseye repos, install via pip
          python3 -m pip install pipx
          # Add user for ansible to target
          useradd -m -s /bin/bash runner
          # Grant sudo access
          echo "runner ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers
          # Install ansible
          pipx install ansible --include-deps
          pipx ensurepath

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare for ansible-pull
        run: |
          HOSTNAME=$(hostname)
          echo "Adding hostname '$HOSTNAME' to inventory..."
          sed -i.bak "/workstation:/a\\    ${HOSTNAME}: {}" hosts.yml
          echo "--- Updated hosts.yml ---" && cat hosts.yml
          # Set root password for ansible 'su' become method
          echo "root:ci-password" | chpasswd
          # Install galaxy collections
          ansible-galaxy collection install ansible.posix community.general
          # Change ownership to the user who will run ansible-pull
          chown -R runner:runner .

      - name: Run ansible-pull for dotfiles
        run: >
          sudo -u runner -E bash -c "echo '${BECOME_PASS}' | ansible-pull -U '${ANSIBLE_REPO}' -K --tags 'onlydotfiles' -e 'target_username=${TARGET_USERNAME}' -e 'target_group=${TARGET_GROUP}' -e 'target_user_home=${TARGET_USER_HOME}'"
        env:
          CI: true
          ANSIBLE_REPO: "file://${{ github.workspace }}"
          TARGET_USERNAME: runner
          TARGET_GROUP: runner
          TARGET_USER_HOME: /home/runner
          # pipx path for container
          BECOME_PASS: ci-password
          PATH: /root/.local/bin:/home/runner/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin