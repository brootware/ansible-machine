name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-dotfiles:
    name: Test Dotfiles on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            distro: ubuntu
          - os: macos-latest
            distro: macos

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Ansible (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        pipx install ansible --include-deps
        pipx ensurepath

    - name: Make bootstrap script executable
      run: chmod +x bootstrap.sh

    - name: Patch bootstrap script for CI
      run: |
        # This step modifies the bootstrap.sh script on the runner to prevent it from
        # re-cloning the repo, which would lose our local hosts.yml modifications.
        # We comment out the git operations and force it to check the local directory.
        sed -i.bak 's|if \[ -d "$REPO_DIR" \]; then|if false; then|' bootstrap.sh
        sed -i.bak 's|git clone "$ANSIBLE_REPO" "$REPO_DIR"|echo "Skipping clone for CI"|' bootstrap.sh
        sed -i.bak 's|"$REPO_DIR/hosts.yml"|"./hosts.yml"|' bootstrap.sh

    - name: Add runner hostname to inventory
      run: |
        HOSTNAME=$(hostname)
        echo "Adding hostname '$HOSTNAME' to inventory..."
        if [[ "${{ matrix.distro }}" == "macos" ]]; then
          sed -i.bak "/workstation:/a\\    ${HOSTNAME}: { mac: true }" hosts.yml
        else
          sed -i.bak "/workstation:/a\\    ${HOSTNAME}: {}" hosts.yml
        fi
        echo "--- Updated hosts.yml ---"
        cat hosts.yml

    - name: Run bootstrap script for dotfiles
      run: ./bootstrap.sh --dotfiles
      env:
        CI: true
        ANSIBLE_REPO: "file://${{ github.workspace }}"
        TARGET_USERNAME: runner
        TARGET_GROUP: runner
        TARGET_USER_HOME: /home/runner
        BECOME_PASS: "ci-password"
        BROOTWARE_PASSWD: "ci-password"

  test-dotfiles-debian:
    name: Test Dotfiles on Debian
    runs-on: ubuntu-latest
    container: debian:bullseye

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y sudo git curl zsh python3-pip python3-venv
          # pipx is not in debian bullseye repos, install via pip
          python3 -m pip install pipx
          # Add user for ansible to target
          useradd -m -s /bin/bash runner
          # Grant sudo access
          echo "runner ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers
          # Install ansible
          pipx install ansible --include-deps
          pipx ensurepath

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make bootstrap script executable
        run: chmod +x bootstrap.sh

      - name: Patch bootstrap script for CI
        run: |
          # This step modifies the bootstrap.sh script on the runner to prevent it from
          # re-cloning the repo, which would lose our local hosts.yml modifications.
          # We comment out the git operations and force it to check the local directory.
          sed -i.bak 's|if \[ -d "$REPO_DIR" \]; then|if false; then|' bootstrap.sh
          sed -i.bak 's|git clone "$ANSIBLE_REPO" "$REPO_DIR"|echo "Skipping clone for CI"|' bootstrap.sh
          sed -i.bak 's|"$REPO_DIR/hosts.yml"|"./hosts.yml"|' bootstrap.sh

      - name: Run bootstrap script for dotfiles
        # Run as the non-root user we created
        run: |
          HOSTNAME=$(hostname)
          chown -R runner:runner .
          echo "Adding hostname '$HOSTNAME' to inventory..."
          sed -i.bak "/workstation:/a\\    ${HOSTNAME}: {}" hosts.yml
          echo "--- Updated hosts.yml ---" && cat hosts.yml
          sudo -u runner -E bash -c './bootstrap.sh --dotfiles'
        env:
          CI: true
          ANSIBLE_REPO: "file://${{ github.workspace }}"
          TARGET_USERNAME: runner
          TARGET_GROUP: runner
          TARGET_USER_HOME: /home/runner
          # pipx path for container
          BECOME_PASS: "ci-password"
          PATH: /root/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin