- name: Brave Browser | Download Brave browser GPG keyring
  ansible.builtin.get_url:
    url: https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
    dest: /usr/share/keyrings/brave-browser-archive-keyring.gpg
    mode: '0644'

- name: Brave Browser | Add Brave browser APT sources
  ansible.builtin.get_url:
    url: https://brave-browser-apt-release.s3.brave.com/brave-browser.sources
    dest: /etc/apt/sources.list.d/brave-browser-release.sources
    mode: '0644'

- name: Brave Browser | update package cache (debian, etc)
  apt: update_cache=yes
  changed_when: false


- name: Install brave browser package and enable 2 fingers swipe back and forth gesture.
  become: true
  block:
    - name: Brave Browser | Install brave browser.
      ansible.builtin.package:
        state: present
        name: brave-browser
        update_cache: true
        cache_valid_time: 86400

    - name: Brave Browser | Replace line in brave-browser.desktop file to enable 2 fingers swipe back and forth gesture. https://gist.github.com/detherminal/1845c794ee3f3cdcc4e7eb713e9ee6fd
      lineinfile:
        path: /usr/share/applications/brave-browser.desktop
        regexp: '^Exec=/usr/bin/brave-browser-stable %U$'
        line: 'Exec=/usr/bin/brave-browser-stable %U --ozone-platform=wayland --enable-features=TouchpadOverscrollHistoryNavigation'
