- name: users | brootware | create personal config directories
  tags: dotfiles,dotfiles-brootware
  file:
    path: /home/brootware/{{ item.dir }}
    state: directory
    owner: brootware
    group: brootware
    mode: 0700
  with_items:
    - { dir: .config }
    - { dir: .config/bpytop }
    - { dir: .config/gtk-3.0 }
    - { dir: .config/terminator }
    - { dir: .local }
    - { dir: .local/share }
    - { dir: .local/share/applications }
    - { dir: bin }

- name: users | brootware | copy personal config files
  tags: dotfiles,dotfiles-brootware
  copy:
    src: users/brootware/{{ item.src }}
    dest: /home/brootware/{{ item.dest }}
    owner: brootware
    group: brootware
    mode: 0600
  with_items:
    - { src: 'bpytop.conf', dest: '.config/bpytop/bpytop.conf' }
    - { src: 'ssh_client_config', dest: '.ssh/config' }