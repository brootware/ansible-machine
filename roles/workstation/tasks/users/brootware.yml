- name: users | brootware | workstation | create personal config directories
  tags: onlydotfiles,mac,tmux,users,vim,zsh
  file:
    path: "{{ target_user_home }}/{{ item.dir }}"
    state: directory
    owner: "{{ target_username }}"
    group: "{{ target_group }}"
    mode: 0700
  with_items:
    - { dir: .config }
    - { dir: .config/bpytop }
    - { dir: .config/gtk-3.0 }
    - { dir: .config/terminator }
    - { dir: .local }
    - { dir: .local/share }
    - { dir: .local/share/applications }
    - { dir: bin }

- name: users | brootware | workstation | copy personal config files
  tags: onlydotfiles,mac,tmux,users,vim,zsh
  copy:
    src: users/brootware/{{ item.src }}
    dest: /home/brootware/{{ item.dest }}
    owner: brootware
    group: brootware
    mode: 0600
  with_items:
    - { src: 'bpytop.conf', dest: '.config/bpytop/bpytop.conf' }
    - { src: 'ssh_client_config', dest: '.ssh/config' }