- name: users | brootware | create group
  tags: groups,brootware,users
  group:
    name: "{{ item.group }}"
    state: present
  with_items:
    - { group: brootware }
    - { group: ansible }

- name: users | brootware | create user
  tags: brootware,sudo,users
  user:
    name: brootware
    group: brootware
    groups: adm,ansible,{{ sudo_group }}
    state: present
    comment: "brootware "
    password: "{{ brootware_passwd | password_hash('sha512') }}"
    shell: /bin/bash

- name: users | brootware | brootware | add sudoers file
  tags: brootware,settings,goodegg,sudo,system,users
  copy:
    src: users/sudoers_brootware
    dest: /etc/sudoers.d/brootware
    owner: root
    group: root
    mode: 0440

- name: users | brootware | create .ssh directory
  tags: dotfiles,brootware,ssh,users
  file:
    path: "{{ item.dir }}"
    state: directory
    owner: brootware
    group: brootware
    mode: 0700
  with_items:
    - { dir: '/home/brootware/.ssh' }

- name: users | brootware | add public key
  tags: dotfiles,brootware,ssh,ssh-keys,users
  ansible.posix.authorized_key:
    user: brootware
    key: "{{ item }}"
  with_file:
    - users/brootware/ssh/brootware_id_ed25519.pub
    - users/brootware/ssh/brootware_id_rsa.pub

- name: users | brootware | create config directories
  tags: dotfiles,brootware,tmux,users,vim,zsh
  file:
    path: /home/brootware/{{ item.dir }}
    state: directory
    owner: brootware
    group: brootware
    mode: 0700
  with_items:
    - { dir: '.bash' }
    - { dir: '.config' }
    - { dir: '.config/htop' }
    - { dir: '.config/mc' }
    - { dir: '.tmux' }
    - { dir: '.tmux/config' }
    - { dir: '.tmux/plugins' }
    - { dir: '.vim' }
    - { dir: '.vim/autoload' }
    - { dir: '.vim/bundle' }
    - { dir: '.vim/colors' }
    - { dir: '.vim/ftplugin' }
    - { dir: '.zsh' }

- name: users | brootware | copy tmux config (server version)
  tags: dotfiles,users,brootware,tmux,users,vim,zsh
  copy:
    src: users/brootware/tmux/tmux.conf.server
    dest: /home/brootware/.tmux.conf
    owner: brootware
    group: brootware
    mode: 0600
  when: "'server' not in group_names"

- name: users | brootware | copy tmux config (workstation version)
  tags: dotfiles,users,brootware,tmux,users,vim,zsh
  copy:
    src: users/brootware/tmux/tmux.conf.workstation
    dest: /home/brootware/.tmux.conf
    owner: brootware
    group: brootware
    mode: 0600
  when: "'server' in group_names"

- name: users | brootware | copy dotfiles
  tags: dotfiles,users,brootware,tmux,users,vim,zsh
  copy:
    src: users/brootware/{{ item.src }}
    dest: /home/brootware/{{ item.dest }}
    owner: brootware
    group: brootware
    mode: 0600
  with_items:
    - { src: 'bash/bash_aliases', dest: '.bash/bash_aliases' }
    - { src: 'bash/bash_profile', dest: '.bash_profile' }
    - { src: 'bash/bash_prompt', dest: '.bash/bash_prompt' }
    - { src: 'bash/bash_functions', dest: '.bash/bash_functions' }
    - { src: 'bash/bashrc', dest: '.bashrc' }
    - { src: 'bash/profile', dest: '.profile' }
    - { src: 'git/gitconfig', dest: '.gitconfig' }
    - { src: 'htop/htoprc', dest: '.config/htop/htoprc' }
    - { src: 'inputrc', dest: '.inputrc' }
    - { src: 'mc/mc.ini', dest: '.config/mc/ini' }
    - { src: 'vim/vimrc', dest: '.vimrc' }
    - { src: 'zsh/zshrc', dest: '.zshrc' }

- name: users | brootware | clone tmux-completion plugin repository
  tags: dotfiles,brootware,users,tmux
  git:
    repo: https://github.com/srsudar/tmux-completion.git
    dest: /home/brootware/.tmux/plugins/completion
    force: yes
  notify: update_tmux_plugin_perms

- name: users | brootware | clone tmux-continuum plugin repository
  tags: dotfiles,brootware,users,tmux
  git:
    repo: https://github.com/tmux-plugins/tmux-continuum
    dest: /home/brootware/.tmux/plugins/continuum
    force: yes
  notify: update_tmux_plugin_perms

- name: users | brootware | clone tmux-resurrect plugin repository
  tags: dotfiles,brootware,users,tmux
  git:
    repo: https://github.com/tmux-plugins/tmux-resurrect
    dest: /home/brootware/.tmux/plugins/resurrect
    force: yes
  notify: update_tmux_plugin_perms

- name: users | brootware | copy individual zsh config files
  tags: dotfiles,brootware,users,zsh
  copy:
    src: users/brootware/zsh/{{ item.src }}
    dest: /home/brootware/.zsh/{{ item.src }}
    owner: brootware
    group: brootware
    mode: 0600
  with_items:
    - { src: 'aliases.zsh' }
    - { src: 'bindkey.zsh' }
    - { src: 'completion.zsh' }
    - { src: 'exports.zsh' }
    - { src: 'functions.zsh' }
    - { src: 'history.zsh' }
    - { src: 'path.zsh' }
    - { src: 'plugins.zsh' }
    - { src: 'prompt.zsh' }
    - { src: 'setopt.zsh' }
    - { src: 'theming.zsh' }

- name: users | brootware | copy vim ftype files
  tags: dotfiles,brootware,users,vim
  copy:
    src: users/brootware/vim/{{ item.src }}
    dest: /home/brootware/.vim/ftplugin/{{ item.src }}
    owner: brootware
    group: brootware
    mode: 0600
  with_items:
    - { src: 'cmake.vim' }
    - { src: 'cpp.vim' }
    - { src: 'html.vim' }
    - { src: 'python.vim' }
    - { src: 'sql.vim' }
    - { src: 'xml.vim' }

- name: users | brootware | copy vim color files
  tags: dotfiles,brootware,users,vim
  copy:
    src: users/brootware/vim/{{ item.src }}
    dest: /home/brootware/.vim/colors/{{ item.src }}
    owner: brootware
    group: brootware
    mode: 0600
  with_items:
    - { src: 'bubblegum-256-dark.vim' }
    - { src: 'darktango.vim' }
    - { src: 'jellybeans.vim' }
    - { src: 'xoria256.vim' }
    - { src: 'zenburn.vim' }

- name: users | brootware | install pathogen
  tags: dotfiles,brootware,users,vim
  copy:
    src: users/brootware/vim/{{ item.src }}
    dest: "{{ item.dest }}"
    owner: brootware
    group: brootware
    mode: 0700
  with_items:
    - { src: 'pathogen.vim', dest: '/home/brootware/.vim/autoload/pathogen.vim' }

- name: users | brootware | checkout git repositories
  tags: git,users,brootware
  become: yes
  git:
    repo: "{{ item.repo }}"
    dest: "{{ item.dest }}"
    force: yes
  with_items:
    - { repo: 'https://github.com/ctrlpvim/ctrlp.vim.git', dest: '/home/brootware/.vim/bundle/ctrlp.vim' }
    - { repo: 'https://github.com/davidhalter/jedi-vim.git', dest: '/home/brootware/.vim/bundle/jedi-vim' }
    - { repo: 'https://github.com/pearofducks/ansible-vim', dest: '/home/brootware/.vim/bundle/ansible-vim' }
    - { repo: 'https://github.com/rhysd/vim-grammarous.git', dest: '/home/brootware/.vim/bundle/vim-grammarous' }
    - { repo: 'https://github.com/ron89/thesaurus_query.vim', dest: '/home/brootware/.vim/bundle/thesaurus_query' }
    - { repo: 'https://github.com/scrooloose/nerdtree.git', dest: '/home/brootware/.vim/bundle/nerdtree' }
    - { repo: 'https://github.com/tpope/vim-obsession.git', dest: '/home/brootware/.vim/bundle/vim-obsession' }
    - { repo: 'https://github.com/vim-syntastic/syntastic.git', dest: '/home/brootware/.vim/bundle/syntastic' }
  notify: update_vim_bundle_perms
